<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>노동OK Q&A 분석 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --bg: #f1f5f9;
    --card: #ffffff;
    --text: #1e293b;
    --muted: #64748b;
    --border: #e2e8f0;
    --green: #10b981;
    --orange: #f59e0b;
    --red: #ef4444;
    --purple: #8b5cf6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
    color: #fff;
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }
  header h1 { font-size: 1.5rem; font-weight: 700; }
  header p { font-size: 0.85rem; opacity: 0.8; margin-top: 4px; }
  #last-updated { font-size: 0.78rem; opacity: 0.7; text-align: right; }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px; }

  /* Tabs */
  .tab-bar {
    display: flex;
    gap: 4px;
    background: var(--card);
    border-radius: 12px;
    padding: 6px;
    margin-bottom: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .tab-btn {
    flex: 1;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.2s;
  }
  .tab-btn.active {
    background: var(--primary);
    color: #fff;
    box-shadow: 0 2px 8px rgba(37,99,235,0.3);
  }
  .tab-btn:not(.active):hover { background: #f1f5f9; color: var(--text); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Combined summary bar */
  .combined-bar {
    background: linear-gradient(135deg, #1e3a8a 0%, #7c3aed 100%);
    color: white;
    border-radius: 12px;
    padding: 16px 24px;
    margin-bottom: 24px;
    display: flex;
    gap: 32px;
    align-items: center;
    flex-wrap: wrap;
    box-shadow: 0 2px 12px rgba(37,99,235,0.2);
  }
  .combined-bar .cb-item { text-align: center; }
  .combined-bar .cb-label { font-size: 0.75rem; opacity: 0.75; margin-bottom: 2px; }
  .combined-bar .cb-val { font-size: 1.4rem; font-weight: 700; }
  .combined-bar .cb-sub { font-size: 0.72rem; opacity: 0.7; }

  /* Progress */
  .progress-section {
    background: var(--card);
    border-radius: 12px;
    padding: 20px 24px;
    margin-bottom: 24px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 10px;
  }
  .progress-header span:first-child { font-weight: 600; font-size: 1rem; }
  .progress-pct { font-size: 1.4rem; font-weight: 700; color: var(--primary); }
  .progress-bar-bg {
    background: #e2e8f0;
    border-radius: 999px;
    height: 12px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #2563eb, #7c3aed);
    transition: width 0.6s ease;
  }
  .progress-sub { margin-top: 8px; font-size: 0.82rem; color: var(--muted); }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border-radius: 12px;
    padding: 18px 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    border-left: 4px solid var(--primary);
  }
  .stat-card.green { border-left-color: var(--green); }
  .stat-card.orange { border-left-color: var(--orange); }
  .stat-card.purple { border-left-color: var(--purple); }
  .stat-card.red { border-left-color: var(--red); }
  .stat-label { font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }
  .stat-value { font-size: 1.7rem; font-weight: 700; line-height: 1; }
  .stat-sub { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

  /* Charts */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  @media (max-width: 720px) { .charts-grid { grid-template-columns: 1fr; } }
  .chart-card {
    background: var(--card);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .chart-card h3 {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .chart-card canvas { max-height: 260px; }

  /* Table */
  .table-section {
    background: var(--card);
    border-radius: 12px;
    padding: 20px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    margin-bottom: 24px;
    overflow-x: auto;
  }
  .table-section h3 {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--muted);
    margin-bottom: 14px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th {
    background: #f8fafc;
    padding: 10px 14px;
    text-align: left;
    font-weight: 600;
    color: var(--muted);
    border-bottom: 2px solid var(--border);
    font-size: 0.8rem;
  }
  td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8fafc; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 600;
    background: #eff6ff;
    color: var(--primary);
  }
  .bar-inline { display: flex; align-items: center; gap: 8px; }
  .bar-inline-fill { height: 6px; border-radius: 999px; background: var(--primary); min-width: 2px; }

  /* Loading / error */
  .loading-block, .error-block {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 1rem;
  }
  .error-block { color: var(--red); }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid #e2e8f0;
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 720px) { .two-col { grid-template-columns: 1fr; } }
</style>
</head>

<header>
  <div>

function switchTab(idx) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  document.querySelectorAll('.tab-panel').forEach((p, i) => p.classList.toggle('active', i === idx));

async function fetchData(url) {
  const resp = await fetch(url + '?t=' + Date.now());
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  const text = await resp.text();
  const lines = text.trim().split('\n').filter(l => l.trim());
  return lines.map(l => { try { return JSON.parse(l); } catch(e) { return null; } }).filter(Boolean);
}

// 복합 슬래시 타입(A/B/C)에서 첫 번째 항목 추출
function primaryCalcType(raw) {
  if (!raw || raw === '해당없음') return null;
  const normalized = CALC_MAP[raw];
  if (normalized) return normalized;
  // 슬래시/쉼표 구분 복합 타입 → 첫 번째 항목
  const first = raw.split(/[\/,]/)[0].trim();
  return CALC_MAP[first] || first;
}

function normalizeQtype(raw) {
  if (!raw) return '미분류';
  return QTYPE_MAP[raw] || raw;
}
// ── 정규화 맵 끝 ────────────────────────────────────────────────────────────

function analyzeRecords(records) {
  const qtypeCounts = {}, qtypeCalc = {}, calcCounts = {}, subtypeCounts = {}, subtypeParent = {}, missingCounts = {};
  let failed = 0, calcNeeded = 0;
  records.forEach(r => {
    if (r.question_type === '분석실패') failed++;
    if (r.requires_calculation === true) calcNeeded++;
    const t = normalizeQtype(r.question_type || '미분류');
    qtypeCounts[t] = (qtypeCounts[t] || 0) + 1;
    if (r.requires_calculation) qtypeCalc[t] = (qtypeCalc[t] || 0) + 1;
    const ct = primaryCalcType(r.calculation_type);
    if (ct && ct !== '해당없음') calcCounts[ct] = (calcCounts[ct] || 0) + 1;
    const st = r.sub_type || '';
    if (st && st.length > 1) { subtypeCounts[st] = (subtypeCounts[st] || 0) + 1; subtypeParent[st] = t; }
    if (Array.isArray(r.missing_info)) r.missing_info.forEach(m => { if (m && m.length > 1) missingCounts[m] = (missingCounts[m] || 0) + 1; });
  });
  return { total: records.length, failed, calcNeeded, qtypeCounts, qtypeCalc, calcCounts, subtypeCounts, subtypeParent, missingCounts };
}

function buildComparison() {
  const container = document.getElementById('dash-2');

  const allTypes = new Set([...Object.keys(d0.qtypeCounts), ...Object.keys(d1.qtypeCounts)]);
  const typesSorted = [...allTypes].sort((a, b) => {
    return ((d0.qtypeCounts[b]||0) + (d1.qtypeCounts[b]||0)) - ((d0.qtypeCounts[a]||0) + (d1.qtypeCounts[a]||0));

  container.innerHTML = `

        <div class="cb-val">${fmt(d0.total + d1.total)}</div>

      </div>
      <div class="cb-item">
        <div class="cb-label">계산 필요 (합산)</div>
        <div class="cb-val">${fmt(d0.calcNeeded + d1.calcNeeded)}</div>
        <div class="cb-sub">${pct(d0.calcNeeded + d1.calcNeeded, d0.total + d1.total)}</div>
      </div>
      <div class="cb-item">
        <div class="cb-label">${ds0.name} 진행률</div>
        <div class="cb-val">${((d0.total/ds0.totalFiles)*100).toFixed(1)}%</div>
        <div class="cb-sub">${fmt(d0.total)} / ${fmt(ds0.totalFiles)}</div>
      </div>
      <div class="cb-item">
        <div class="cb-label">${ds1.name} 진행률</div>
        <div class="cb-val">${((d1.total/ds1.totalFiles)*100).toFixed(1)}%</div>
        <div class="cb-sub">${fmt(d1.total)} / ${fmt(ds1.totalFiles)}</div>

    <!-- Comparison chart -->
    <div class="chart-card" style="margin-bottom:24px">
      <h3>📊 질문 유형 비교 (최근 10k vs 이전 10k)</h3>
      <canvas id="cmp-chart" style="max-height:400px"></canvas>
    </div>

    <!-- Comparison table -->
    <div class="table-section">
      <h3>📋 질문 유형별 비교표</h3>
      <table>
        <thead>
          <tr>
            <th>질문 유형</th>
            <th>최근 10k (p.1~500)</th>
            <th>비율</th>

            <th>비율</th>
            <th>변화</th>
          </tr>
        </thead>
        <tbody id="cmp-tbl"></tbody>

    </div>

    <!-- Calc type comparison -->

  // Calc type comparison
  const allCalcTypes = new Set([...Object.keys(d0.calcCounts), ...Object.keys(d1.calcCounts)]);

// panel 0→DATASETS[0], panel 1→DATASETS[1], panel 2→비교(없음), panel 3→DATASETS[2]
const PANEL_DS_MAP = [0, 1, null, 2];

async function loadPanel(panelIdx) {
  const dsIdx = PANEL_DS_MAP[panelIdx];
  const ds = DATASETS[dsIdx];
  const loadingEl = document.getElementById('loading-' + panelIdx);
  const errorEl = document.getElementById('error-' + panelIdx);
  const dashEl = document.getElementById('dash-' + panelIdx);
  try {
    const records = await fetchData(ds.jsonlUrl);
    loadedData[panelIdx] = records;
    loadingEl.style.display = 'none';
    dashEl.style.display = 'block';
    buildDashboard(panelIdx, records, ds);
    document.getElementById('last-updated').textContent =
      '마지막 갱신: ' + new Date().toLocaleString('ko-KR');
  } catch(e) {
    loadingEl.style.display = 'none';
    errorEl.style.display = 'block';
    if (panelIdx === 1 && (e.message.includes('404') || e.message.includes('HTTP 4'))) {
      errorEl.textContent = '이전 10,000건 분석 데이터 준비 중... (크롤링 완료 후 분석 시작 예정)';
      errorEl.style.color = '#f59e0b';
    } else if (panelIdx === 3 && (e.message.includes('404') || e.message.includes('HTTP 4'))) {
      errorEl.innerHTML = '⏳ 전체 20,000건 통합 파일 준비 중...<br><small style="color:#94a3b8">두 데이터셋 분석이 모두 완료되면 자동으로 생성됩니다.</small>';
      errorEl.style.color = '#f59e0b';
    } else {
      errorEl.textContent = '데이터 로드 실패: ' + e.message;
    }
  }
}

// Load all datasets in parallel (tab 3 = combined, loads first as default active tab)
Promise.all([loadPanel(0), loadPanel(1), loadPanel(3)]);
