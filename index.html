<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 노동법 상담</title>
<style>
  :root {
    --bg: #f7f8fa;
    --card: #ffffff;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --text: #1e293b;
    --text-secondary: #64748b;
    --border: #e2e8f0;
    --user-bg: #dbeafe;
    --bot-bg: #ffffff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    text-align: center;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  header p { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

  #chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
  }
  .message {
    margin-bottom: 16px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .message.user { flex-direction: row-reverse; }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .message.user .avatar { background: var(--primary); color: white; }
  .message.bot .avatar { background: #e2e8f0; }
  .bubble {
    max-width: 75%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.6;
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .message.user .bubble {
    background: var(--user-bg);
    border-bottom-right-radius: 4px;
  }
  .message.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .bubble strong { font-weight: 600; }
  .bubble code {
    background: #f1f5f9;
    padding: 1px 4px;
    border-radius: 3px;
    font-size: 13px;
  }

  .typing-indicator {
    display: inline-flex;
    gap: 4px;
    padding: 8px 0;
  }
  .typing-indicator span {
    width: 6px; height: 6px;
    background: var(--text-secondary);
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out;
  }
  .typing-indicator span:nth-child(1) { animation-delay: 0s; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

  #input-area {
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 16px 24px;
  }
  #input-form {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    gap: 8px;
  }
  #input-form textarea {
    flex: 1;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 120px;
    line-height: 1.5;
  }
  #input-form textarea:focus { border-color: var(--primary); }
  #input-form button {
    padding: 10px 20px;
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  #input-form button:hover { background: var(--primary-hover); }
  #input-form button:disabled { background: #94a3b8; cursor: not-allowed; }

  .welcome {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-secondary);
  }
  .welcome h2 { font-size: 20px; color: var(--text); margin-bottom: 12px; }
  .welcome p { font-size: 14px; line-height: 1.8; }
  .examples {
    margin-top: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .examples button {
    padding: 8px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text);
  }
  .examples button:hover { border-color: var(--primary); color: var(--primary); }
</style>
</head>
<body>

<header>
  <h1>AI 노동법 상담</h1>
  <p>임금계산 + 법령/판례 검색 기반 노동상담 챗봇</p>
</header>

<div id="chat-container">
  <div class="welcome" id="welcome">
    <h2>노동법 관련 궁금한 점을 질문해 주세요</h2>
    <p>임금/수당 계산, 퇴직금, 연차, 해고 등<br>노동법 전반에 대해 상담해 드립니다.</p>
    <div class="examples">
      <button onclick="askExample(this)">월급 250만원, 주5일 하루 10시간 근무 시 연장수당은?</button>
      <button onclick="askExample(this)">3년 근무 후 퇴직하면 퇴직금 얼마인가요?</button>
      <button onclick="askExample(this)">5인 미만 사업장도 주휴수당 줘야 하나요?</button>
      <button onclick="askExample(this)">최저임금보다 적게 받고 있는데 어떻게 하나요?</button>
    </div>
  </div>
</div>

<div id="input-area">
  <form id="input-form" onsubmit="sendMessage(event)">
    <textarea id="user-input" rows="1" placeholder="질문을 입력하세요..."
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button type="submit" id="send-btn">전송</button>
  </form>
</div>

<script>
let sessionId = null;
let isStreaming = false;
// GitHub Pages에서는 외부 API 서버를 사용, 같은 도메인이면 빈 문자열
const API_BASE = location.hostname === 'localhost' ? '' : 'https://laborconsult.vercel.app';

function askExample(btn) {
  document.getElementById('user-input').value = btn.textContent;
  sendMessage(new Event('submit'));
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage(e);
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function addMessage(role, text) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const container = document.getElementById('chat-container');
  const div = document.createElement('div');
  div.className = `message ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? 'U' : 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;

  div.appendChild(avatar);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;

  return bubble;
}

function addTypingIndicator() {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const container = document.getElementById('chat-container');
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typing';

  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = 'AI';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';

  div.appendChild(avatar);
  div.appendChild(bubble);
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTypingIndicator() {
  const el = document.getElementById('typing');
  if (el) el.remove();
}

async function sendMessage(e) {
  e.preventDefault();
  if (isStreaming) return;

  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;
  isStreaming = true;

  addMessage('user', text);
  addTypingIndicator();

  try {
    const params = new URLSearchParams({ message: text });
    if (sessionId) params.append('session_id', sessionId);

    const response = await fetch(`${API_BASE}/api/chat/stream?${params}`);
    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    removeTypingIndicator();
    let bubble = null;
    let fullText = '';
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const jsonStr = line.slice(6);
        if (!jsonStr) continue;

        let event;
        try { event = JSON.parse(jsonStr); } catch { continue; }

        if (event.type === 'session') {
          sessionId = event.session_id;
        } else if (event.type === 'meta') {
          // 계산 결과 메타데이터 수신 (필요 시 활용)
        } else if (event.type === 'chunk') {
          if (!bubble) bubble = addMessage('bot', '');
          fullText += event.text;
          bubble.textContent = fullText;
          document.getElementById('chat-container').scrollTop =
            document.getElementById('chat-container').scrollHeight;
        } else if (event.type === 'follow_up') {
          if (!bubble) bubble = addMessage('bot', '');
          bubble.textContent = event.text;
        } else if (event.type === 'done') {
          // 스트리밍 완료
        }
      }
    }

    if (!bubble && !fullText) {
      addMessage('bot', '죄송합니다. 응답을 생성하지 못했습니다.');
    }
  } catch (err) {
    removeTypingIndicator();
    addMessage('bot', `오류가 발생했습니다: ${err.message}`);
  } finally {
    isStreaming = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}
</script>
</body>
</html>
