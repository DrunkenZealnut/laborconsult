<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>기초 노동상담</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<style>
  /* ── Design Tokens ── */
  :root {
    --navy: #1B2A4A;
    --navy-light: #2D4A7A;
    --navy-deep: #0F1B30;
    --copper: #C08050;
    --copper-light: #E6C4A8;
    --copper-glow: rgba(192,128,80,0.15);
    --cream: #F7F5F2;
    --warm-white: #FFFFFF;
    --text: #1E293B;
    --text-secondary: #526070;
    --text-muted: #8B95A5;
    --border: #E4E1DB;
    --border-light: #F0EDE8;
    --shadow-sm: 0 1px 3px rgba(27,42,74,0.06);
    --shadow-md: 0 4px 16px rgba(27,42,74,0.08);
    --shadow-lg: 0 8px 32px rgba(27,42,74,0.1);
    --radius-sm: 8px;
    --radius-md: 14px;
    --radius-lg: 20px;
    --radius-pill: 50px;
    --font-display: 'Noto Serif KR', 'Georgia', serif;
    --font-body: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    /* Callout colors (chat rendering) */
    --co-legal-bg: #eff6ff; --co-legal-border: #2563eb; --co-legal-icon: #1d4ed8;
    --co-warn-bg: #fffbeb; --co-warn-border: #d97706; --co-warn-icon: #b45309;
    --co-danger-bg: #fef2f2; --co-danger-border: #dc2626; --co-danger-icon: #b91c1c;
    --co-tip-bg: #f0fdf4; --co-tip-border: #16a34a; --co-tip-icon: #15803d;
    --co-summary-bg: #eff6ff; --co-summary-border: #2563eb;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-body); background: var(--cream); color: var(--text); min-height: 100dvh; -webkit-font-smoothing: antialiased; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; }

  /* ── HEADER (minimal) ── */
  #site-header {
    position: fixed; top: 16px; right: 16px; z-index: 200;
  }
  .hamburger-btn {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--warm-white); border: 1px solid var(--border);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-sm); transition: all 0.2s;
  }
  .hamburger-btn:hover { border-color: var(--copper); box-shadow: var(--shadow-md); }

  /* Slide menu */
  .slide-menu {
    position: fixed; top: 0; right: -320px; width: 300px; height: 100dvh;
    background: var(--warm-white); z-index: 300;
    box-shadow: -8px 0 32px rgba(0,0,0,0.1);
    transition: right 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
    padding: 24px; overflow-y: auto;
  }
  .slide-menu.open { right: 0; }
  .slide-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 250;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .slide-overlay.open { opacity: 1; pointer-events: auto; }
  .menu-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border);
  }
  .menu-logo {
    font-family: var(--font-display); font-weight: 900; font-size: 17px; color: var(--navy);
  }
  .menu-close {
    width: 36px; height: 36px; border-radius: 50%; background: var(--cream);
    border: none; cursor: pointer; font-size: 18px; color: var(--text-muted);
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .menu-close:hover { color: var(--text); background: var(--border); }
  .menu-section { margin-bottom: 20px; }
  .menu-section-title {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px;
  }
  .menu-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 14px; border-radius: var(--radius-sm);
    font-size: 15px; color: var(--text); text-decoration: none;
    transition: all 0.15s; cursor: pointer;
    background: none; border: none; width: 100%; text-align: left;
    font-family: var(--font-body);
  }
  .menu-item:hover { background: var(--cream); color: var(--copper); }
  .menu-item svg { flex-shrink: 0; color: var(--text-muted); }
  .menu-item:hover svg { color: var(--copper); }
  .menu-divider { height: 1px; background: var(--border); margin: 12px 0; }

  /* ── LANDING (Google-style center) ── */
  #landing {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 40vh; padding: 40px 20px 20px; text-align: center;
  }
  .landing-logo {
    font-family: var(--font-display); font-size: 36px; font-weight: 900;
    color: var(--navy); margin-bottom: 32px; letter-spacing: -0.5px;
  }

  /* ── MAIN CONTENT ── */
  #main-content { }

  /* ── CHAT SECTION ── */
  #chat-section {
    padding: 0 20px; background: var(--cream); width: 100%;
  }
  .chat-container {
    max-width: 800px; margin: 0 auto;
  }
  .section-label {
    font-family: var(--font-display); font-size: 12px; font-weight: 700;
    color: var(--copper); text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 10px; text-align: center;
  }
  .section-heading {
    font-family: var(--font-display); font-size: 28px; font-weight: 700;
    color: var(--navy); text-align: center; margin-bottom: 8px;
  }
  .section-desc {
    text-align: center; color: var(--text-muted); font-size: 15px;
    margin-bottom: 32px; line-height: 1.6;
  }
  .chat-card {
    background: var(--warm-white); border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg); border: 1px solid var(--border-light);
    overflow: visible; display: flex; flex-direction: column;
  }

  /* Chat messages area — hidden until first interaction */
  #chat {
    height: 0; min-height: 0; max-height: 0; overflow: hidden;
    padding: 0 20px; display: flex; flex-direction: column; gap: 12px;
    transition: all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
  }
  .chat-card.active #chat {
    height: auto; min-height: 0; max-height: none;
    overflow-y: visible; padding: 20px;
  }

  /* Fullview — not used in single Q&A mode */
  #chat-fullview { display: none; }

  /* ── Answer Action Bar ── */
  .answer-actions {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    padding: 16px 20px; border-top: 1px solid var(--border-light);
    animation: fadeInUp 0.3s ease;
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .answer-actions button {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 18px; font-size: 14px; font-weight: 500;
    color: var(--text-secondary); background: var(--warm-white);
    border: 1px solid var(--border); border-radius: var(--radius-pill);
    cursor: pointer; transition: all 0.2s; font-family: var(--font-body);
    white-space: nowrap;
  }
  .answer-actions button:hover {
    border-color: var(--copper); color: var(--copper);
    box-shadow: var(--shadow-sm); transform: translateY(-1px);
  }
  .answer-actions button.done {
    color: #16a34a; border-color: #16a34a;
  }

  /* Collapsed input — prominent search bar style */
  .chat-card:not(.active) #input-wrapper { border-top: none; }
  .chat-card:not(.active) #input-area textarea {
    font-size: 17px; padding: 14px 20px; min-height: 52px;
    background: var(--cream); border-radius: var(--radius-lg);
  }
  .chat-card:not(.active) #input-area { padding: 16px 20px; }


  /* Messages */
  .msg { max-width: 100%; padding: 12px 16px; border-radius: 14px; font-size: 15px; line-height: 1.7; word-break: break-word; }
  .msg.user {
    align-self: flex-end; background: var(--navy); color: white;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start; background: #f8f7f5; border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.assistant :first-child { margin-top: 0; }
  .msg.status { align-self: center; background: transparent; color: var(--text-muted); font-size: 13px; padding: 4px 8px; }

  .sources { font-size: 12px; color: var(--text-muted); margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }
  .sources a { color: var(--navy-light); text-decoration: none; }
  .sources a:hover { text-decoration: underline; }

  /* Contact cards */
  .contact-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; max-width: 80%; }
  .contact-chip { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--cream); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; color: var(--text); line-height: 1.4; }
  .contact-chip .cc-name { font-weight: 600; white-space: nowrap; }
  .contact-chip .cc-phone { color: var(--navy-light); font-weight: 600; white-space: nowrap; }
  .contact-chip .cc-desc { color: var(--text-muted); }
  .contact-chip a { color: var(--navy-light); text-decoration: none; }
  .contact-chip a:hover { text-decoration: underline; }

  /* ── Markdown in assistant messages ── */
  .msg.assistant h2 { font-size: 16px; margin: 14px 0 6px; }
  .msg.assistant h3 { font-size: 15px; margin: 10px 0 4px; }
  .msg.assistant p { margin: 6px 0; }
  .msg.assistant ul, .msg.assistant ol { margin: 6px 0 6px 20px; }
  .msg.assistant table { border-collapse: collapse; margin: 10px 0; font-size: 14px; width: auto; display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 8px; border: 1px solid var(--border); }
  .msg.assistant th { background: var(--navy); color: #fff; font-weight: 600; padding: 8px 14px; text-align: left; white-space: nowrap; border: none; border-bottom: 2px solid var(--navy-deep); }
  .msg.assistant td { padding: 7px 14px; text-align: left; white-space: nowrap; border: none; border-bottom: 1px solid var(--border); }
  .msg.assistant tr:nth-child(even) td { background: var(--cream); }
  .msg.assistant tr:last-child td { border-bottom: none; }
  .msg.assistant tr.total-row td { font-weight: 700; border-top: 2px solid var(--navy); background: var(--co-legal-bg); }
  .msg.assistant td.num-cell { text-align: right; font-variant-numeric: tabular-nums; }
  .msg.assistant code { background: var(--cream); padding: 1px 4px; border-radius: 3px; font-size: 13px; }
  .msg.assistant pre { background: var(--cream); padding: 10px; border-radius: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 8px 0; }
  .msg.assistant pre code { background: none; padding: 0; }
  .msg.assistant strong { font-weight: 600; }
  .msg.assistant blockquote { border-left: 3px solid var(--copper); padding-left: 10px; color: var(--text-muted); margin: 6px 0; }
  .msg.assistant .callout { border-left: 4px solid var(--border); border-radius: 0 8px 8px 0; padding: 10px 14px; margin: 10px 0; font-size: 14px; line-height: 1.6; color: var(--text); }
  .msg.assistant .callout-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }
  .msg.assistant .callout-legal  { background: var(--co-legal-bg);  border-left-color: var(--co-legal-border); }
  .msg.assistant .callout-warn   { background: var(--co-warn-bg);   border-left-color: var(--co-warn-border); }
  .msg.assistant .callout-danger { background: var(--co-danger-bg); border-left-color: var(--co-danger-border); }
  .msg.assistant .callout-tip    { background: var(--co-tip-bg);    border-left-color: var(--co-tip-border); }
  .msg.assistant .callout-legal  .callout-title { color: var(--co-legal-icon); }
  .msg.assistant .callout-warn   .callout-title { color: var(--co-warn-icon); }
  .msg.assistant .callout-danger .callout-title { color: var(--co-danger-icon); }
  .msg.assistant .callout-tip    .callout-title { color: var(--co-tip-icon); }
  .msg.assistant .summary-badge { background: var(--co-summary-bg); border-left: 5px solid var(--co-summary-border); border-radius: 0 10px 10px 0; padding: 12px 16px; margin: 10px 0; font-size: 15px; line-height: 1.7; }
  .msg.assistant .summary-badge h2 { font-size: 16px; margin: 0 0 6px; color: var(--co-legal-icon); }
  .msg.assistant .step-list { list-style: none; margin: 10px 0; padding: 0; counter-reset: step-counter; }
  .msg.assistant .step-list li { counter-increment: step-counter; position: relative; padding: 8px 0 8px 40px; margin: 0; line-height: 1.5; font-size: 14px; }
  .msg.assistant .step-list li::before { content: counter(step-counter); position: absolute; left: 0; top: 8px; width: 26px; height: 26px; border-radius: 50%; background: var(--navy); color: #fff; font-size: 13px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
  .msg.assistant .step-list li::after { content: ''; position: absolute; left: 12px; top: 36px; width: 2px; height: calc(100% - 28px); background: var(--border); }
  .msg.assistant .step-list li:last-child::after { display: none; }
  .msg.assistant hr { border: none; height: 1px; background: linear-gradient(to right, transparent, var(--border), transparent); margin: 18px 0; }
  .msg.assistant .disclaimer-notice { font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 14px; padding-top: 10px; line-height: 1.5; }
  .msg.assistant .math-display { overflow-x: auto; margin: 10px 0; text-align: center; }
  .msg.assistant .math-inline { display: inline; }

  /* Copy button */
  .msg-wrapper { display: flex; flex-direction: column; }
  .msg-wrapper.user-side { align-items: flex-end; }
  .msg-wrapper.assistant-side { align-items: flex-start; }
  .copy-btn { background: var(--warm-white); border: 1px solid var(--border); border-radius: 6px; padding: 4px 8px; cursor: pointer; color: var(--text-muted); font-size: 12px; opacity: 0; transition: opacity 0.15s; display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; align-self: flex-start; }
  .msg-wrapper:hover .copy-btn { opacity: 1; }
  .copy-btn:hover { color: var(--copper); border-color: var(--copper); }
  .copy-btn.copied { color: #16a34a; border-color: #16a34a; }

  /* Chat input area */
  #input-wrapper { border-top: 1px solid var(--border-light); background: var(--warm-white); padding-bottom: env(safe-area-inset-bottom); }
  #file-preview { display: flex; gap: 6px; padding: 8px 20px 0; flex-wrap: wrap; }
  #file-preview:empty { display: none; }
  .file-chip { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: var(--cream); border: 1px solid var(--border); border-radius: 16px; font-size: 12px; color: var(--text); }
  .file-chip img { width: 20px; height: 20px; object-fit: cover; border-radius: 3px; }
  .file-chip .remove { cursor: pointer; color: var(--text-muted); font-weight: bold; margin-left: 2px; }
  .file-chip .remove:hover { color: #ef4444; }
  #input-area { padding: 14px 20px; display: flex; gap: 8px; align-items: center; }
  #attach-btn {
    background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 9px; cursor: pointer; color: var(--text-muted);
    display: flex; align-items: center; flex-shrink: 0; transition: all 0.2s;
  }
  #attach-btn:hover { border-color: var(--copper); color: var(--copper); }
  #input-area textarea {
    flex: 1; border: 1px solid var(--border); border-radius: var(--radius-md);
    padding: 10px 16px; font-size: 15px; outline: none; resize: none;
    min-height: 42px; max-height: 120px; line-height: 1.5; font-family: var(--font-body);
    overflow-y: auto; background: var(--cream); transition: border-color 0.2s;
  }
  .input-hint {
    text-align: center; font-size: 12px; color: var(--text-muted); padding: 4px 0 0;
  }
  #input-area textarea:focus { border-color: var(--copper); box-shadow: 0 0 0 3px var(--copper-glow); }
  #send-btn {
    background: var(--navy); color: white; border: none; border-radius: var(--radius-md);
    padding: 10px 22px; font-size: 15px; font-weight: 600; cursor: pointer;
    font-family: var(--font-body); transition: all 0.2s; white-space: nowrap;
  }
  #send-btn:hover { background: var(--navy-light); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Drop overlay */
  #drop-overlay { display: none; position: fixed; inset: 0; background: rgba(192,128,80,0.08); border: 3px dashed var(--copper); z-index: 200; align-items: center; justify-content: center; font-size: 18px; color: var(--copper); font-weight: 600; pointer-events: none; }
  #drop-overlay.active { display: flex; }

  /* ── FAQ SECTION (hidden by default, accessible from menu) ── */
  #faq-section { padding: 80px 20px; background: var(--warm-white); display: none; }
  #faq-section.visible { display: block; }
  .faq-container { max-width: 800px; margin: 0 auto; }
  #faq-tabs { display: flex; gap: 8px; padding-bottom: 24px; justify-content: center; flex-wrap: wrap; }
  .faq-tab {
    padding: 8px 18px; border: 1px solid var(--border); border-radius: var(--radius-pill);
    background: transparent; cursor: pointer; font-size: 14px; font-weight: 500;
    white-space: nowrap; transition: all 0.2s; font-family: var(--font-body); color: var(--text-secondary);
  }
  .faq-tab:hover { border-color: var(--copper); color: var(--copper); }
  .faq-tab.active { background: var(--navy); color: white; border-color: var(--navy); }
  #faq-list { display: flex; flex-direction: column; gap: 8px; }
  .faq-item {
    padding: 14px 18px; background: var(--cream); border: 1px solid transparent;
    border-radius: var(--radius-md); cursor: pointer; font-size: 15px; text-align: left;
    transition: all 0.2s; display: flex; align-items: center; gap: 10px;
    font-family: var(--font-body); color: var(--text); width: 100%;
  }
  .faq-item:hover { border-color: var(--copper); background: var(--warm-white); box-shadow: var(--shadow-sm); transform: translateX(4px); }
  .faq-item::before { content: "\1F4AC"; font-size: 16px; flex-shrink: 0; }
  .faq-item::after {
    content: '\2192'; margin-left: auto; color: var(--text-muted); font-size: 16px;
    opacity: 0; transition: opacity 0.2s; flex-shrink: 0;
  }
  .faq-item:hover::after { opacity: 1; color: var(--copper); }

  /* ── BOARD SECTION (hidden by default) ── */
  #board-section { padding: 80px 20px; background: var(--cream); display: none; }
  #board-section.visible { display: block; }
  .board-container { max-width: 800px; margin: 0 auto; }
  .board-item { background: var(--warm-white); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 8px; overflow: hidden; transition: all 0.2s; }
  .board-item:hover { border-color: var(--copper); box-shadow: var(--shadow-sm); }
  .board-q { padding: 14px 18px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; }
  .board-q .board-cat { background: rgba(192,128,80,0.1); color: var(--copper); font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: var(--radius-pill); white-space: nowrap; flex-shrink: 0; }
  .board-q .board-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .board-q .board-time { color: var(--text-muted); font-size: 12px; white-space: nowrap; flex-shrink: 0; }
  .board-q .board-chevron { color: var(--text-muted); transition: transform 0.25s; flex-shrink: 0; font-size: 12px; }
  .board-item.open .board-chevron { transform: rotate(180deg); }
  .board-a { display: none; padding: 0 18px 14px; font-size: 13px; color: var(--text-secondary); line-height: 1.7; border-top: 1px solid var(--border-light); padding-top: 14px; }
  .board-item.open .board-a { display: block; }
  .board-ask-btn { display: inline-block; margin-top: 8px; color: var(--copper); font-size: 12px; font-weight: 600; cursor: pointer; background: none; border: none; font-family: var(--font-body); }
  .board-ask-btn:hover { text-decoration: underline; }
  #board-more-btn { border: none; background: none; cursor: pointer; color: var(--copper); font-size: 14px; font-weight: 600; font-family: var(--font-body); padding: 8px 16px; }
  #board-more-btn:hover { text-decoration: underline; }
  .section-link-wrap { text-align: center; margin-top: 20px; }

  /* ── FOOTER (sticky bottom, 3 lines) ── */
  #site-footer {
    background: var(--navy-deep); color: rgba(255,255,255,0.5); padding: 12px 24px;
    font-size: 12px; line-height: 1.6; border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    margin-top: auto; text-align: center;
  }
  .footer-inner { max-width: 800px; margin: 0 auto; }
  .footer-title { color: rgba(255,255,255,0.85); font-family: var(--font-display); font-size: 14px; font-weight: 700; }
  .footer-info { color: rgba(255,255,255,0.45); margin: 2px 0; }
  .footer-info a { color: var(--copper-light); text-decoration: none; }
  .footer-info a:hover { text-decoration: underline; }
  .footer-links { display: flex; gap: 8px; justify-content: center; }
  .footer-links a { color: rgba(255,255,255,0.35); text-decoration: none; font-size: 11px; }
  .footer-links a:hover { color: rgba(255,255,255,0.7); }

<script>

// export 함수 alias (메뉴에서 호출)
function exportChat() {
  var btn = document.getElementById('export-btn');
  if (btn) btn.click();
}

// ── API 베이스 URL ────────────────────────────────────────────────────────────
const API_BASE = location.hostname.includes('github.io')
  ? 'https://laborconsult.vercel.app'
  : '';

const chat = document.getElementById('chat');
const msgInput = document.getElementById('msg-input');

// ── 대화 저장 (마크다운) ────────────────────────────────────────────────────

document.getElementById('export-btn').addEventListener('click', exportChatMarkdown);

function exportChatMarkdown() {
  const wrappers = chat.querySelectorAll('.msg-wrapper');
  const pairs = [];
  let questionNum = 0;

  for (const w of wrappers) {
    const userEl = w.querySelector('.msg.user');
    const assistantEl = w.querySelector('.msg.assistant');

    if (userEl) {
      questionNum++;
      pairs.push({ type: 'user', num: questionNum, text: userEl.innerText.trim() });
    }
    if (assistantEl) {
      if (questionNum === 0) continue;
      const mdText = assistantEl.dataset.md || assistantEl.innerText;
      pairs.push({ type: 'assistant', num: questionNum, text: mdText.trim() });
    }
  }

  if (pairs.length === 0) {
    alert('저장할 대화 내용이 없습니다.');
    return;
  }

  const now = new Date();
  const dateStr = now.toLocaleString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  const lines = [
    '# 기초 노동상담 기록\n',
    `> 날짜: ${dateStr}`,
    '> 출처: nodong.kr AI 노동상담 챗봇\n',
    '---\n',
  ];

  for (const p of pairs) {
    if (p.type === 'user') {
      lines.push(`## 질문 ${p.num}\n`);
      lines.push(p.text + '\n');
    } else {
      lines.push(`## 답변 ${p.num}\n`);
      lines.push(p.text + '\n');
      lines.push('---\n');
    }
  }

  lines.push('> 본 상담 기록은 AI가 제공한 참고 정보이며, 법적 효력이 없습니다.');
  lines.push('> 정확한 사항은 고용노동부(1350) 또는 공인노무사에게 확인하시기 바랍니다.');

  const md_text = lines.join('\n');
  const ts = now.toISOString().replace(/[-:T]/g, '').slice(0, 14);
  const filename = `기초노동상담_${ts}.md`;
  const blob = new Blob([md_text], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);

  const exportBtn = document.getElementById('export-btn');
  exportBtn.classList.add('exported');
  exportBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> 저장됨';
  setTimeout(() => {
    exportBtn.classList.remove('exported');
    exportBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> 저장';
  }, 2000);
}

const btn = document.getElementById('send-btn');
const attachBtn = document.getElementById('attach-btn');
const fileInput = document.getElementById('file-input');
const filePreview = document.getElementById('file-preview');
const dropOverlay = document.getElementById('drop-overlay');
let sessionId = null;
try { sessionId = sessionStorage.getItem('chatSessionId'); } catch (e) { /* ignore */ }
let pendingFiles = [];
const MAX_FILES = 3;

msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey && !btn.disabled) {
    e.preventDefault();
    send();
  }
});
msgInput.addEventListener('input', () => {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 150) + 'px';
});
btn.addEventListener('click', send);

// ── 파일 첨부 ────────────────────────────────────────────────────────────────

attachBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  addFiles(Array.from(e.target.files));
  fileInput.value = '';
});

let dragCounter = 0;
document.addEventListener('dragenter', e => { e.preventDefault(); dragCounter++; dropOverlay.classList.add('active'); });
document.addEventListener('dragleave', e => { e.preventDefault(); dragCounter--; if (dragCounter <= 0) { dragCounter = 0; dropOverlay.classList.remove('active'); } });
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault();
  dragCounter = 0;
  dropOverlay.classList.remove('active');
  addFiles(Array.from(e.dataTransfer.files));
});

function addFiles(files) {
  for (const f of files) {
    if (pendingFiles.length >= MAX_FILES) {
      alert('파일은 최대 3개까지 첨부할 수 있습니다.');
      break;
    }
    const ok = f.type.startsWith('image/') ||
               f.type === 'application/pdf' ||
               f.type === 'text/plain' || f.type === 'text/markdown' ||
               f.name.endsWith('.txt') || f.name.endsWith('.md');
    if (!ok) {
      alert('지원하지 않는 파일 형식입니다: ' + f.name + '\n이미지(JPG/PNG), PDF, TXT 파일만 가능합니다.');
      continue;
    }
    const maxMB = f.type.startsWith('image/') ? 3 : f.type === 'application/pdf' ? 3 : 1;
    if (f.size > maxMB * 1024 * 1024) {
      alert('파일이 너무 큽니다: ' + f.name + ' (최대 ' + maxMB + 'MB)');
      continue;
    }
    pendingFiles.push(f);
  }
  renderPreview();
}

function renderPreview() {
  filePreview.innerHTML = '';
  pendingFiles.forEach((f, i) => {
    const chip = document.createElement('span');
    chip.className = 'file-chip';
    if (f.type.startsWith('image/')) {
      const img = document.createElement('img');
      img.src = URL.createObjectURL(f);
      chip.appendChild(img);
    }
    const name = document.createElement('span');
    const sizeMB = (f.size / 1024 / 1024).toFixed(1);
    name.textContent = f.name + ' (' + sizeMB + 'MB)';
    chip.appendChild(name);
    const rm = document.createElement('span');
    rm.className = 'remove';
    rm.textContent = '\u00d7';
    rm.onclick = () => { pendingFiles.splice(i, 1); renderPreview(); };
    chip.appendChild(rm);
    filePreview.appendChild(chip);
  });
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// ── 채팅 확장 (첫 상호작용 시) ────────────────────────────────────────────────

function expandChat() {
  const card = document.getElementById('chat-card');
  if (!card.classList.contains('active')) {
    card.classList.add('active');
  }
  // 액션바만 제거 (이전 대화는 유지)
  const oldActions = card.querySelector('.answer-actions');
  if (oldActions) oldActions.remove();
}

// ── 메시지 ───────────────────────────────────────────────────────────────────

function addMsg(role, html, rawMarkdown) {
  const wrapper = document.createElement('div');
  wrapper.className = 'msg-wrapper ' + (role === 'user' ? 'user-side' : 'assistant-side');
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerHTML = html;
  wrapper.appendChild(d);

  if (role === 'assistant' && rawMarkdown) d.dataset.md = rawMarkdown;

  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
  return d;
}

function ensureCopyBtn(el) {
  const wrapper = el.closest('.msg-wrapper');
  if (!wrapper || wrapper.querySelector('.copy-btn')) return;
  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.title = '질문+답변 복사';
  copyBtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> 복사';
  copyBtn.onclick = () => copyConversation(wrapper, copyBtn);
  wrapper.appendChild(copyBtn);
}

function copyConversation(wrapper, cbtn) {
  const parts = [];
  let prev = wrapper.previousElementSibling;
  while (prev && prev.classList.contains('msg-wrapper') && !prev.querySelector('.msg.user')) {
    prev = prev.previousElementSibling;
  }
  if (prev && prev.querySelector('.msg.user')) {
    const userEl = prev.querySelector('.msg.user');
    parts.push('**Q.** ' + userEl.textContent.trim());
  }
  const assistantEl = wrapper.querySelector('.msg.assistant');
  const mdText = assistantEl.dataset.md || assistantEl.textContent;
  parts.push('**A.**\n' + mdText.trim());

  navigator.clipboard.writeText(parts.join('\n\n')).then(() => {
    cbtn.classList.add('copied');
    cbtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
    setTimeout(() => {
      cbtn.classList.remove('copied');
      cbtn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
    }, 2000);
  });
}

function removeStatus() {
  chat.querySelectorAll('.msg.status').forEach(s => {
    const w = s.closest('.msg-wrapper');
    if (w) w.remove(); else s.remove();
  });
}

// ── KaTeX ────────────────────────────────────────────────────────────────────

function renderTex(tex, displayMode) {
  if (typeof katex === 'undefined') {
    const cls = displayMode ? 'math-display' : 'math-inline';
    const delim = displayMode ? '$$' : '$';
    return '<span class="' + cls + ' math-pending" data-tex="' + tex.replace(/"/g, '&quot;') + '" data-display="' + displayMode + '">' + delim + tex + delim + '</span>';
  }
  try {
    const html = katex.renderToString(tex, { displayMode, throwOnError: false, trust: true });
    return displayMode
      ? '<div class="math-display">' + html + '</div>'
      : '<span class="math-inline">' + html + '</span>';
  } catch (e) {
    return '<code>' + tex + '</code>';
  }
}

function renderPendingMath(container) {
  if (typeof katex === 'undefined') return;
  container.querySelectorAll('.math-pending').forEach(el => {
    const tex = el.getAttribute('data-tex');
    const displayMode = el.getAttribute('data-display') === 'true';
    try {
      const html = katex.renderToString(tex, { displayMode, throwOnError: false, trust: true });
      if (displayMode) {
        const div = document.createElement('div');
        div.className = 'math-display';
        div.innerHTML = html;
        el.replaceWith(div);
      } else {
        const span = document.createElement('span');
        span.className = 'math-inline';
        span.innerHTML = html;
        el.replaceWith(span);
      }
    } catch (e) { /* keep raw */ }
  });
}

// ── Markdown → HTML ──────────────────────────────────────────────────────────

function inlineTransform(t) {
  return t
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
}

const CALLOUT_MAP = [
  { pattern: /^(?:📘\s*)?(?:\*\*)?(?:법적\s*근거|관련\s*법조문|관련\s*법률|관련\s*판례|법령)(?:\*\*)?/i, type: 'legal', icon: '📘' },
  { pattern: /^(?:⚠️\s*)?(?:\*\*)?(?:주의사항|주의|유의|예외)(?:\*\*)?/i, type: 'warn', icon: '⚠️' },
  { pattern: /^(?:🚨\s*)?(?:\*\*)?(?:중요|필수|경고|금지)(?:\*\*)?/i, type: 'danger', icon: '🚨' },
  { pattern: /^(?:💡\s*)?(?:\*\*)?(?:참고|팁|알아두세요|도움말|안내)(?:\*\*)?/i, type: 'tip', icon: '💡' },
];

function md(text) {
  const blocks = [];
  function stash(html) { blocks.push(html); return '\x00B' + (blocks.length - 1) + '\x00'; }

  text = text.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    stash('<pre><code>' + code.replace(/</g, '&lt;') + '</code></pre>')
  );
  text = text.replace(/\$\$([\s\S]*?)\$\$/g, (_, tex) => stash(renderTex(tex.trim(), true)));
  text = text.replace(/\\\[([\s\S]*?)\\\]/g, (_, tex) => stash(renderTex(tex.trim(), true)));
  text = text.replace(/\$([^\$\n]+?)\$/g, (_, tex) => stash(renderTex(tex.trim(), false)));
  text = text.replace(/\\\(([\s\S]*?)\\\)/g, (_, tex) => stash(renderTex(tex.trim(), false)));

  text = text.replace(/((?:^\|.+\|[ \t]*$\n?)+)/gm, block => {
    const rows = block.trim().split('\n');
    let h = '<table>';
    let headerDone = false;
    for (const row of rows) {
      if (/^\|[\s:|-]+\|$/.test(row.trim())) { headerDone = true; continue; }
      const cells = row.replace(/^\||\|$/g, '').split('|').map(c => c.trim());
      const tag = !headerDone ? 'th' : 'td';
      const isTotal = cells.some(c => /^(?:\*\*)?(?:합\s*계|총\s*계|소\s*계|total|sum)(?:\*\*)?$/i.test(c.replace(/\*\*/g, '').trim()));
      h += '<tr' + (isTotal ? ' class="total-row"' : '') + '>';
      for (const c of cells) {
        const isNum = (tag === 'td') && /^[\d,]+(?:\.\d+)?(?:\s*원)?$/.test(c.replace(/\*\*/g, '').trim());
        h += '<' + tag + (isNum ? ' class="num-cell"' : '') + '>' + c + '</' + tag + '>';
      }
      h += '</tr>';
      if (!headerDone) headerDone = true;
    }
    h += '</table>';
    return stash(h);
  });

  text = text.replace(/((?:^[ \t]*[-*] .+$\n?)+)/gm, block => {
    const items = block.trim().split('\n').map(l => '<li>' + l.replace(/^[ \t]*[-*] /, '') + '</li>');
    return stash('<ul>' + items.join('') + '</ul>');
  });

  text = text.replace(/((?:^[ \t]*\d+\. .+$\n?)+)/gm, (block, _, offset) => {
    const preceding = text.slice(Math.max(0, offset - 200), offset);
    const isStep = /(?:절차|방법|순서|과정|단계|대응|신청|진행)\s*$/m.test(preceding)
      || /^#{2,3}\s.*(?:절차|방법|순서|과정|단계|대응|신청|진행)/m.test(preceding);
    const items = block.trim().split('\n').map(l => '<li>' + inlineTransform(l.replace(/^[ \t]*\d+\. /, '')) + '</li>');
    return stash(isStep ? '<ol class="step-list">' + items.join('') + '</ol>' : '<ol>' + items.join('') + '</ol>');
  });

  text = text.replace(/((?:^> .+$\n?)+)/gm, block => {
    const lines = block.trim().split('\n').map(l => l.replace(/^> ?/, ''));
    const joined = lines.join('\n');
    for (const { pattern, type, icon } of CALLOUT_MAP) {
      const m = joined.match(pattern);
      if (m) {
        const title = m[0].replace(/\*\*/g, '');
        const body = inlineTransform(joined.slice(m[0].length).replace(/^[\s:：\-]+/, '')).replace(/\n/g, '<br>');
        return stash('<div class="callout callout-' + type + '"><div class="callout-title">' + icon + ' ' + title + '</div>' + body + '</div>');
      }
    }
    return stash('<blockquote>' + inlineTransform(joined).replace(/\n/g, '<br>') + '</blockquote>');
  });

  let html = text
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, (_, title) => {
      if (/^(?:⚖️\s*|📋\s*)?(?:핵심\s*답변|결론|답변\s*요약|요약)/.test(title)) {
        return '<div class="summary-badge"><h2>' + title + '</h2></div>';
      }
      return '<h2>' + title + '</h2>';
    })
    .replace(/^# (.+)$/gm, '<h2>$1</h2>')
    .replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/^---$/gm, '<hr>');

  html = html.replace(/\n\n+/g, '</p><p>').replace(/\n/g, '<br>');
  html = html.replace(/\x00B(\d+)\x00/g, (_, i) => '</p>' + blocks[+i] + '<p>');
  html = '<p>' + html + '</p>';
  html = html.replace(/<p>\s*<\/p>/g, '');
  html = html.replace(/(<p>(?:⚠️\s*)?본\s*(?:답변|계산\s*결과|판정\s*결과)은?\s*참고용[\s\S]*?<\/p>)$/, '<div class="disclaimer-notice">$1</div>');
  return html;
}

function renderContacts(agencies, afterEl) {
  const wrapper = afterEl.closest('.msg-wrapper');
  if (!wrapper || wrapper.querySelector('.contact-bar')) return;
  const bar = document.createElement('div');
  bar.className = 'contact-bar';
  for (const a of agencies) {
    const chip = document.createElement('span');
    chip.className = 'contact-chip';
    let html = '<span class="cc-name">' + a.name + '</span> '
             + '<span class="cc-phone">' + a.phone + '</span>';
    if (a.url) html += ' <a href="https://' + a.url + '" target="_blank">' + a.url + '</a>';
    if (a.desc) html += '<br><span class="cc-desc">' + a.desc + '</span>';
    chip.innerHTML = html;
    bar.appendChild(chip);
  }
  const copyBtnEl = wrapper.querySelector('.copy-btn');
  if (copyBtnEl) wrapper.insertBefore(bar, copyBtnEl);
  else wrapper.appendChild(bar);
}

async function readSSE(resp) {
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let statusEl = addMsg('status', '질문 분석 중...');
  let assistantEl = null;
  let fullText = '';
  let pendingContacts = null;

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buffer += decoder.decode(value, { stream: true });

    const lines = buffer.split('\n');
    buffer = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const event = JSON.parse(line.slice(6));

      if (event.type === 'session') {
        sessionId = event.session_id;
        try { sessionStorage.setItem('chatSessionId', sessionId); } catch (e) { /* ignore */ }
      } else if (event.type === 'status') {
        statusEl.textContent = event.text;
      } else if (event.type === 'contacts') {
        pendingContacts = event.agencies;
      } else if (event.type === 'error') {
        removeStatus();
        const el = addMsg('assistant', event.text);
        ensureCopyBtn(el);
        if (pendingContacts) renderContacts(pendingContacts, el);
      } else if (event.type === 'follow_up') {
        removeStatus();
        const el = addMsg('assistant', md(event.text), event.text);
        renderPendingMath(el);
        ensureCopyBtn(el);
        if (pendingContacts) renderContacts(pendingContacts, el);
      } else if (event.type === 'sources' || event.type === 'meta') {
        // handled in answer
      } else if (event.type === 'replace') {
        if (assistantEl) {
          fullText = event.text;
          assistantEl.innerHTML = md(fullText);
          assistantEl.dataset.md = fullText;
          renderPendingMath(assistantEl);
          chat.scrollTop = chat.scrollHeight;
        }
      } else if (event.type === 'chunk') {
        removeStatus();
        if (!assistantEl) assistantEl = addMsg('assistant', '', '');
        fullText += event.text;
        assistantEl.innerHTML = md(fullText);
        assistantEl.dataset.md = fullText;
        renderPendingMath(assistantEl);
        chat.scrollTop = chat.scrollHeight;
      }
    }
  }
  // 마지막 assistant 메시지에 액션 바 표시
  var lastAssistant = assistantEl || chat.querySelector('.msg-wrapper.assistant-side:last-of-type .msg.assistant');
  if (lastAssistant) {
    if (pendingContacts) renderContacts(pendingContacts, lastAssistant);
    chat.scrollTop = chat.scrollHeight;
    showAnswerActions(lastAssistant);
  }
  if (!assistantEl && !lastAssistant && !document.querySelector('.msg.status + .msg.assistant')) {
    removeStatus();
    addMsg('assistant', '서버 응답이 중단되었습니다. 잠시 후 다시 시도해주세요.');
  }
}

function escHtml(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function getQAPair() {
  // 전체 대화 내용을 수집 (이어지는 질문 포함)
  let fullMd = '', fullHtml = '', lastQuestion = '';
  const wrappers = chat.querySelectorAll('.msg-wrapper');
  wrappers.forEach(function(w) {
    const q = w.querySelector('.msg.user');
    const a = w.querySelector('.msg.assistant:not(.status)');
    if (q) { lastQuestion = q.textContent.trim(); fullMd += '\n\n## 질문\n\n' + lastQuestion; }
    if (a) {
      const aMd = a.dataset.md || a.textContent.trim();
      fullMd += '\n\n## 답변\n\n' + aMd;
      fullHtml += '<div class="q">' + escHtml(lastQuestion || '') + '</div><div class="a">' + a.innerHTML + '</div>';
    }
  });
  return { question: lastQuestion, answerMd: fullMd.trim(), answerHtml: fullHtml };
}

function actionCopy(btn) {
  const { answerMd } = getQAPair();
  const text = answerMd;
  navigator.clipboard.writeText(text).then(function() {
    btn.classList.add('done');
    btn.innerHTML = btn.innerHTML.replace('복사하기', '복사됨');
    setTimeout(function() {
      btn.classList.remove('done');
      btn.innerHTML = btn.innerHTML.replace('복사됨', '복사하기');
    }, 2000);
  });
}

function actionMarkdown() {
  const { answerMd } = getQAPair();
  const ts = new Date().toISOString().slice(0, 10);
  const content = '# 기초 노동상담\n\n' +
    '날짜: ' + ts + '\n\n' +
    answerMd + '\n\n' +
    '---\n*AI가 생성한 답변으로, 법적 효력이 없습니다.*\n';
  const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '기초노동상담_' + ts + '.md';
  a.click();
  URL.revokeObjectURL(a.href);
}

function actionEmail(btn) {
  const to = prompt('받는 사람 이메일 주소를 입력하세요:');
  if (!to || !to.includes('@')) return;

  const { question, answerHtml } = getQAPair();
  const subject = '[기초 노동상담] ' + question.slice(0, 50);

  btn.disabled = true;
  btn.innerHTML = btn.innerHTML.replace('이메일 전송', '전송 중...');

  fetch(API_BASE + '/api/send-email', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ to: to, subject: subject, body_html: answerHtml }),
  })
  .then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
  .then(function(res) {
    if (res.ok) {
      btn.classList.add('done');
      btn.innerHTML = btn.innerHTML.replace('전송 중...', '전송 완료');
      setTimeout(function() {
        btn.classList.remove('done');
        btn.innerHTML = btn.innerHTML.replace('전송 완료', '이메일 전송');
        btn.disabled = false;
      }, 2000);
    } else {
      alert(res.data.detail || '전송 실패');
      btn.innerHTML = btn.innerHTML.replace('전송 중...', '이메일 전송');
      btn.disabled = false;
    }
  })
  .catch(function() {
    alert('이메일 전송에 실패했습니다.');
    btn.innerHTML = btn.innerHTML.replace('전송 중...', '이메일 전송');
    btn.disabled = false;
  });
}

// ── 전송 ─────────────────────────────────────────────────────────────────────

async function send() {
  const text = msgInput.value.trim();
  if (!text && pendingFiles.length === 0) return;

  expandChat();

  let displayHtml = text ? text.replace(/</g, '&lt;').replace(/\n/g, '<br>') : '';
  if (pendingFiles.length > 0) {
    const names = pendingFiles.map(f => f.name).join(', ');
    if (displayHtml) displayHtml += '<br>';
    displayHtml += '<span style="font-size:12px;opacity:0.8">\uD83D\uDCCE ' + names + '</span>';
  }
  addMsg('user', displayHtml);

  const attachments = [];
  for (const f of pendingFiles) {
    attachments.push({
      filename: f.name,
      content_type: f.type || 'application/octet-stream',
      data: await fileToBase64(f),
    });
  }

  msgInput.value = '';
  msgInput.style.height = 'auto';
  pendingFiles = [];
  renderPreview();
  btn.disabled = true;

  try {
    let resp;
    if (attachments.length > 0) {
      resp = await fetch(API_BASE + '/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          session_id: sessionId,
          attachments,
        }),
      });
    } else {
      const params = new URLSearchParams({ message: text });
      if (sessionId) params.set('session_id', sessionId);
      resp = await fetch(API_BASE + '/api/chat/stream?' + params);
    }
    if (!resp.ok) {
      let detail = '';
      try { const body = await resp.json(); detail = body.detail || ''; } catch (_) {}
      throw new Error('서버 오류 (' + resp.status + ')' + (detail ? ': ' + detail : ''));
    }
    await readSSE(resp);
  } catch (e) {
    removeStatus();
    addMsg('assistant', '오류가 발생했습니다: ' + e.message);
  } finally {
    removeStatus();
    btn.disabled = false;
    msgInput.focus();
  }
}

function initHeroCalcs() {
  const container = document.getElementById('hero-calcs');
  CALC_SHORTCUTS.forEach(c => {
    const chip = document.createElement('button');
    chip.className = 'hero-calc-chip';
    chip.innerHTML = c.icon + ' ' + c.name;
    chip.onclick = () => askQuestion(c.query);
    container.appendChild(chip);
  });
}

// ── Board ────────────────────────────────────────────────────────────────────

let boardPage = 1;
let boardLoading = false;

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getTimeAgo(isoStr) {
  const diff = Date.now() - new Date(isoStr).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return '방금 전';
  if (mins < 60) return mins + '분 전';
  const hours = Math.floor(mins / 60);
  if (hours < 24) return hours + '시간 전';
  const days = Math.floor(hours / 24);
  if (days < 30) return days + '일 전';
  return new Date(isoStr).toLocaleDateString('ko-KR');
}

async function loadBoard(append) {
  if (boardLoading) return;
  boardLoading = true;

  const moreBtn = document.getElementById('board-more-btn');
  moreBtn.textContent = '불러오는 중...';

  try {
    const resp = await fetch(API_BASE + '/api/board/recent?page=' + boardPage + '&per_page=10');
    if (!resp.ok) throw new Error('API error');
    const data = await resp.json();

    const list = document.getElementById('board-list');
    if (!append) list.innerHTML = '';

    data.items.forEach(item => {
      const div = document.createElement('div');
      div.className = 'board-item';
      const timeAgo = getTimeAgo(item.created_at);
      const qText = escHtml(item.question);
      const aText = escHtml(item.answer_preview);
      div.innerHTML =
        '<div class="board-q" onclick="this.parentElement.classList.toggle(\'open\')">' +
          '<span class="board-cat">' + escHtml(item.category || '일반') + '</span>' +
          '<span class="board-text">' + qText + '</span>' +
          '<span class="board-time">' + timeAgo + '</span>' +
          '<span class="board-chevron">\u25BC</span>' +
        '</div>' +
        '<div class="board-a">' +
          aText +
          '<br><button class="board-ask-btn" onclick="askQuestion(\'' + qText.replace(/'/g, "\\'") + '\')">비슷한 질문하기 \u2192</button>' +
        '</div>';
      list.appendChild(div);
    });

    moreBtn.style.display = data.has_more ? '' : 'none';
    moreBtn.textContent = '더 보기 \u2193';
  } catch (e) {
    console.error('Board load error:', e);
    if (!append) {
      document.getElementById('board-list').innerHTML =
        '<p style="text-align:center;color:var(--text-muted);padding:20px;">질문을 불러올 수 없습니다.</p>';
    }
    moreBtn.style.display = 'none';
  } finally {
    boardLoading = false;
  }
}

document.getElementById('board-more-btn').addEventListener('click', () => {
  boardPage++;
  loadBoard(true);
});

const boardObserver = new IntersectionObserver(entries => {
  if (entries[0].isIntersecting && !boardLoading) {
    loadBoard(false);
    boardObserver.disconnect();
  }
}, { rootMargin: '200px' });
boardObserver.observe(document.getElementById('board-section'));

// ── Scroll Reveal ────────────────────────────────────────────────────────────

const revealObserver = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    }
  });
}, { threshold: 0.08 });

document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

// ── Back to Top ──────────────────────────────────────────────────────────────

const backBtn = document.getElementById('back-to-top');
window.addEventListener('scroll', () => {
  backBtn.classList.toggle('visible', window.scrollY > 600);
}, { passive: true });
backBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ── Init ─────────────────────────────────────────────────────────────────────

initFAQ();
</script>
