<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>질문게시판 — 노동OK</title>
<meta name="description" content="노동법 관련 질문과 AI 답변을 검색해보세요. 임금, 퇴직금, 해고, 실업급여 등 다양한 노동상담 사례를 확인할 수 있습니다.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.4/dist/purify.min.js"></script>
<style>
  :root {
    --navy: #1B2A4A; --navy-light: #2D4A7A; --navy-deep: #0F1B30;
    --copper: #C08050; --copper-light: #E6C4A8; --copper-glow: rgba(192,128,80,0.15);
    --cream: #F7F5F2; --warm-white: #FFFFFF;
    --text: #1E293B; --text-secondary: #526070; --text-muted: #8B95A5;
    --border: #E4E1DB; --border-light: #F0EDE8;
    --shadow-sm: 0 1px 3px rgba(27,42,74,0.06);
    --shadow-md: 0 4px 16px rgba(27,42,74,0.08);
    --radius-sm: 8px; --radius-md: 14px; --radius-lg: 20px; --radius-pill: 50px;
    --font-display: 'Noto Serif KR', 'Georgia', serif;
    --font-body: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-body); background: var(--cream); color: var(--text); min-height: 100dvh; -webkit-font-smoothing: antialiased; max-width: 800px; margin: 0 auto; }

  /* ── HEADER ── */
  #site-header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(247,245,242,0.9);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: max(10px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) 10px max(20px, env(safe-area-inset-left));
  }
  .header-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
  .header-logo { font-family: var(--font-display); font-weight: 900; font-size: 22px; color: var(--navy); text-decoration: none; letter-spacing: -0.5px; flex-shrink: 0; }
  .header-logo span { color: var(--copper); }
  .header-nav { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .header-nav a {
    font-family: var(--font-body); font-size: 13px; color: var(--text-secondary);
    text-decoration: none; border: 1px solid var(--border); border-radius: var(--radius-pill);
    padding: 6px 14px; background: transparent; transition: all 0.2s; white-space: nowrap;
  }
  .header-nav a:hover { border-color: var(--copper); color: var(--copper); }
  .header-nav a.active { background: var(--copper); color: #fff; border-color: var(--copper); }

  /* ── HERO ── */
  #board-hero {
    background: var(--navy); color: #fff; position: relative; overflow: hidden;
    padding: 40px 24px 32px; border-radius: var(--radius-lg); text-align: center;
  }
  #board-hero::before {
    content: ''; position: absolute;
    width: 500px; height: 500px; border-radius: 50%;
    background: radial-gradient(circle, var(--copper-glow) 0%, transparent 70%);
    top: -200px; right: -100px; pointer-events: none;
  }
  #board-hero h1 { font-family: var(--font-display); font-size: 32px; font-weight: 900; position: relative; z-index: 1; letter-spacing: -0.5px; }
  #board-hero h1 em { font-style: normal; color: var(--copper-light); }
  #board-hero p { color: rgba(255,255,255,0.7); font-size: 15px; margin-top: 8px; position: relative; z-index: 1; }
  #board-stats { color: var(--copper-light); font-size: 14px; margin-top: 16px; position: relative; z-index: 1; }
  #board-stats strong { font-weight: 700; font-size: 18px; }

  /* ── SEARCH ── */
  #search-section { padding: 24px 20px 0; }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  #search-input {
    width: 100%; padding: 14px 20px 14px 44px;
    border: 1px solid var(--border); border-radius: var(--radius-md);
    background: var(--warm-white); font-size: 15px; font-family: var(--font-body);
    color: var(--text); outline: none; transition: border-color 0.2s;
  }
  #search-input:focus { border-color: var(--copper); }
  #search-input::placeholder { color: var(--text-muted); }

  /* ── CATEGORY CHIPS ── */
  #filter-section { padding: 16px 20px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
  #filter-section::-webkit-scrollbar { display: none; }
  #category-chips { display: flex; gap: 8px; flex-wrap: nowrap; }
  .cat-chip {
    padding: 7px 16px; border: 1px solid var(--border); border-radius: var(--radius-pill);
    background: transparent; font-size: 13px; font-family: var(--font-body);
    color: var(--text-secondary); cursor: pointer; white-space: nowrap;
    transition: all 0.2s; flex-shrink: 0;
  }
  .cat-chip:hover { border-color: var(--copper); color: var(--copper); }
  .cat-chip.active { background: var(--copper); color: #fff; border-color: var(--copper); }

  /* ── BOARD LIST ── */
  #board-section { padding: 16px 20px 0; }
  #result-info { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .board-item {
    background: var(--warm-white); border: 1px solid var(--border);
    border-radius: var(--radius-md); margin-bottom: 8px; overflow: hidden; transition: all 0.2s;
  }
  .board-item:hover { border-color: var(--copper); box-shadow: var(--shadow-sm); }
  .board-q {
    padding: 14px 18px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px;
  }
  .board-cat {
    background: rgba(192,128,80,0.1); color: var(--copper);
    font-size: 11px; font-weight: 600; padding: 3px 10px;
    border-radius: var(--radius-pill); white-space: nowrap; flex-shrink: 0;
  }
  .board-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .board-time { color: var(--text-muted); font-size: 12px; white-space: nowrap; flex-shrink: 0; }
  .board-chevron { color: var(--text-muted); transition: transform 0.25s; flex-shrink: 0; font-size: 12px; }
  .board-item.open .board-chevron { transform: rotate(180deg); }

  /* ── ANSWER AREA ── */
  .board-a {
    display: none; padding: 0 18px 18px; border-top: 1px solid var(--border-light);
  }
  .board-item.open .board-a { display: block; }
  .board-a-loading { padding: 20px 0; text-align: center; color: var(--text-muted); font-size: 13px; }
  .md-content { font-size: 14px; line-height: 1.8; color: var(--text); padding-top: 14px; }
  .md-content h2 { font-size: 16px; font-weight: 700; margin: 20px 0 8px; color: var(--navy); }
  .md-content h3 { font-size: 15px; font-weight: 600; margin: 16px 0 6px; }
  .md-content p { margin: 8px 0; }
  .md-content ul, .md-content ol { padding-left: 20px; margin: 8px 0; }
  .md-content li { margin: 4px 0; }
  .md-content table { border-collapse: collapse; width: 100%; font-size: 13px; margin: 12px 0; overflow-x: auto; display: block; }
  .md-content th, .md-content td { border: 1px solid var(--border); padding: 8px 10px; text-align: left; }
  .md-content th { background: var(--cream); font-weight: 600; }
  .md-content blockquote { border-left: 3px solid var(--copper); padding: 8px 12px; color: var(--text-secondary); margin: 12px 0; background: rgba(192,128,80,0.04); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; }
  .md-content strong { color: var(--navy); }
  .md-content code { background: rgba(27,42,74,0.06); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .md-content hr { border: none; border-top: 1px solid var(--border-light); margin: 16px 0; }
  .board-ask-btn {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 16px;
    color: var(--copper); font-size: 13px; font-weight: 600; cursor: pointer;
    background: rgba(192,128,80,0.08); border: 1px solid rgba(192,128,80,0.2);
    border-radius: var(--radius-pill); padding: 8px 18px;
    font-family: var(--font-body); transition: all 0.2s; text-decoration: none;
  }
  .board-ask-btn:hover { background: rgba(192,128,80,0.15); }

  /* ── PAGINATION ── */
  #pagination {
    display: flex; justify-content: center; align-items: center; gap: 4px;
    padding: 32px 20px 16px;
  }
  .page-btn {
    min-width: 36px; height: 36px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--warm-white); font-size: 14px; font-family: var(--font-body);
    color: var(--text-secondary); cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .page-btn:hover:not(:disabled):not(.active) { border-color: var(--copper); color: var(--copper); }
  .page-btn.active { background: var(--copper); color: #fff; border-color: var(--copper); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  /* ── EMPTY STATE ── */
  .empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
  .empty-state svg { margin-bottom: 16px; }
  .empty-state p { font-size: 15px; }
  .empty-state .empty-sub { font-size: 13px; margin-top: 8px; }

  /* ── LOADING ── */
  .loading-skeleton { padding: 20px; }
  .skeleton-item {
    background: linear-gradient(90deg, var(--border-light) 25%, var(--cream) 50%, var(--border-light) 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite;
    height: 56px; border-radius: var(--radius-md); margin-bottom: 8px;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* ── FOOTER ── */
  #site-footer {
    background: var(--navy-deep); color: rgba(255,255,255,0.5); padding: 12px 24px;
    font-size: 13px; line-height: 1.7; border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    margin-top: 32px;
  }
  .footer-inner { max-width: 800px; margin: 0 auto; text-align: center; }
  .footer-org { display: flex; flex-direction: column; gap: 2px; margin-bottom: 8px; }
  .footer-org strong { color: rgba(255,255,255,0.85); font-family: var(--font-display); font-size: 17px; }
  .footer-org a { color: var(--copper-light); text-decoration: none; }
  .footer-org a:hover { text-decoration: underline; }
  .footer-links { display: flex; gap: 8px; justify-content: center; }
  .footer-links a { color: rgba(255,255,255,0.5); text-decoration: none; }
  .footer-links a:hover { color: rgba(255,255,255,0.8); }

  /* ── RESPONSIVE ── */
  @media (max-width: 480px) {
    #board-hero { padding: 32px 20px 24px; }
    #board-hero h1 { font-size: 26px; }
    .board-q { padding: 12px 14px; font-size: 13px; gap: 8px; }
    .board-cat { font-size: 10px; padding: 2px 8px; }
    .board-time { display: none; }
    .md-content { font-size: 13px; }
  }

  /* ── WRITE BUTTON ── */
  .write-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 18px; border: 1px solid var(--copper); border-radius: var(--radius-pill);
    background: var(--copper); color: #fff; font-size: 13px; font-weight: 600;
    font-family: var(--font-body); cursor: pointer; transition: all 0.2s; white-space: nowrap;
  }
  .write-btn:hover { background: #a86a3a; border-color: #a86a3a; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
    justify-content: center; align-items: center; padding: 20px;
  }
  .modal-overlay.active { display: flex; }
  .modal-box {
    background: var(--warm-white); border-radius: var(--radius-lg);
    width: 100%; max-width: 480px; max-height: 90dvh; overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2); padding: 28px 24px;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 16px; right: 16px; background: none; border: none;
    font-size: 22px; color: var(--text-muted); cursor: pointer; line-height: 1;
  }
  .modal-close:hover { color: var(--text); }
  .modal-title {
    font-family: var(--font-display); font-size: 22px; font-weight: 700;
    color: var(--navy); margin-bottom: 20px;
  }
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block; font-size: 13px; font-weight: 600; color: var(--text);
    margin-bottom: 6px;
  }
  .form-label .required { color: var(--copper); margin-left: 2px; }
  .form-input, .form-select, .form-textarea {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 14px; font-family: var(--font-body);
    color: var(--text); background: var(--warm-white); outline: none; transition: border-color 0.2s;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus { border-color: var(--copper); }
  .form-textarea { resize: vertical; min-height: 100px; }
  .form-hint { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .form-hint.error { color: #d44; }
  .char-count { float: right; }

  /* CAPTCHA */
  .captcha-row { display: flex; align-items: center; gap: 10px; }
  .captcha-question {
    background: var(--cream); border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 16px; font-size: 16px; font-weight: 700; color: var(--navy);
    white-space: nowrap; letter-spacing: 1px;
  }
  .captcha-input { width: 80px; text-align: center; }
  .captcha-refresh {
    background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
    width: 38px; height: 38px; cursor: pointer; font-size: 16px; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .captcha-refresh:hover { border-color: var(--copper); }

  /* Submit */
  .submit-btn {
    width: 100%; padding: 14px; border: none; border-radius: var(--radius-md);
    background: var(--copper); color: #fff; font-size: 15px; font-weight: 700;
    font-family: var(--font-body); cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  .submit-btn:hover { background: #a86a3a; }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* DELETE */
  .board-delete-btn {
    display: inline-flex; align-items: center; gap: 4px;
    color: var(--text-muted); font-size: 12px; cursor: pointer;
    background: none; border: 1px solid var(--border); border-radius: var(--radius-pill);
    padding: 5px 12px; font-family: var(--font-body); transition: all 0.2s;
    margin-left: 8px;
  }
  .board-delete-btn:hover { color: #d44; border-color: #d44; }

  /* SOURCE BADGE */
  .board-source {
    font-size: 10px; font-weight: 600; padding: 2px 8px;
    border-radius: var(--radius-pill); white-space: nowrap; flex-shrink: 0;
  }
  .board-source.user { background: rgba(52,152,219,0.1); color: #2980b9; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--navy); color: #fff; padding: 12px 24px;
    border-radius: var(--radius-pill); font-size: 14px; font-family: var(--font-body);
    box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 300;
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  #toast.show { opacity: 1; }

  /* DELETE PROMPT */
  .delete-prompt {
    display: flex; align-items: center; gap: 8px; margin-top: 12px;
    padding: 10px 14px; background: var(--cream); border-radius: var(--radius-sm);
  }
  .delete-prompt input {
    flex: 1; padding: 6px 10px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 13px; font-family: var(--font-body); outline: none;
  }
  .delete-prompt input:focus { border-color: var(--copper); }
  .delete-prompt button {
    padding: 6px 14px; border: none; border-radius: var(--radius-sm);
    font-size: 13px; font-family: var(--font-body); cursor: pointer; font-weight: 600;
  }
  .delete-confirm { background: #d44; color: #fff; }
  .delete-cancel { background: var(--border); color: var(--text); }

  @media print {
    #site-header, #search-section, #filter-section, #pagination, .board-ask-btn, .write-btn { display: none !important; }
    .board-item.open .board-a { display: block !important; }
    body { max-width: 100%; }
  }
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<header id="site-header">
  <div class="header-inner">
    <a href="/" class="header-logo">노동<span>OK</span></a>
    <nav class="header-nav">
      <a href="/">AI 상담</a>
      <a href="/board" class="active">게시판</a>
      <a href="/calculators">계산기</a>
    </nav>
  </div>
</header>

<!-- ═══ HERO ═══ -->
<section id="board-hero">
  <h1>질문<em>게시판</em></h1>
  <p>다른 분들이 물어본 질문과 답변을 검색해보세요</p>
  <div id="board-stats">총 <strong id="total-count">-</strong>건의 질문</div>
</section>

<!-- ═══ MAIN ═══ -->
<main>

  <!-- SEARCH BAR -->
  <section id="search-section">
    <div class="search-wrap">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search-input" placeholder="검색어를 입력하세요 (예: 주휴수당, 퇴직금)" autocomplete="off">
    </div>
  </section>

  <!-- CATEGORY FILTER -->
  <section id="filter-section">
    <div id="category-chips">
      <button class="cat-chip active" data-cat="" onclick="selectCategory(this, '')">전체</button>
    </div>
  </section>

  <!-- BOARD LIST -->
  <section id="board-section">
    <div id="result-info"></div>
    <div id="board-list">
      <div class="loading-skeleton">
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
        <div class="skeleton-item"></div>
      </div>
    </div>
  </section>

  <!-- PAGINATION -->
  <nav id="pagination" aria-label="페이지 탐색"></nav>

</main>

<!-- ═══ WRITE MODAL ═══ -->
<div class="modal-overlay" id="write-modal" onclick="if(event.target===this)closeWriteModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeWriteModal()" aria-label="닫기">&times;</button>
    <div class="modal-title">질문하기</div>
    <form id="write-form" onsubmit="return submitPost(event)">
      <div class="form-group">
        <label class="form-label">닉네임<span class="required">*</span></label>
        <input class="form-input" id="w-nickname" type="text" maxlength="10" placeholder="2~10자" required>
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호<span class="required">*</span> <span style="font-weight:400;color:var(--text-muted)">(삭제 시 필요)</span></label>
        <input class="form-input" id="w-password" type="password" maxlength="20" placeholder="4~20자" required>
      </div>
      <div class="form-group">
        <label class="form-label">카테고리</label>
        <select class="form-select" id="w-category">
          <option value="일반상담">일반상담</option>
          <option value="임금·수당">임금·수당</option>
          <option value="퇴직금">퇴직금</option>
          <option value="해고">해고</option>
          <option value="실업급여">실업급여</option>
          <option value="휴가·휴일">휴가·휴일</option>
          <option value="4대보험">4대보험</option>
          <option value="산업재해">산업재해</option>
          <option value="직장내 괴롭힘">직장내 괴롭힘</option>
          <option value="육아·출산">육아·출산</option>
          <option value="임금체불">임금체불</option>
          <option value="근로장려금">근로장려금</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">질문 내용<span class="required">*</span></label>
        <textarea class="form-textarea" id="w-question" maxlength="2000" placeholder="노동법 관련 질문을 작성해주세요 (10~2000자)" required oninput="updateCharCount()"></textarea>
        <div class="form-hint"><span class="char-count" id="w-charcount">0/2000</span></div>
      </div>
      <div class="form-group">
        <label class="form-label">보안문자<span class="required">*</span></label>
        <div class="captcha-row">
          <span class="captcha-question" id="captcha-q">로딩 중...</span>
          <input class="form-input captcha-input" id="w-captcha" type="number" placeholder="답" required>
          <button type="button" class="captcha-refresh" onclick="loadCaptcha()" title="새로고침">&#x21bb;</button>
        </div>
      </div>
      <div id="w-error" class="form-hint error" style="display:none;margin-bottom:12px"></div>
      <button type="submit" class="submit-btn" id="w-submit">질문 등록하기</button>
    </form>
  </div>
</div>

<!-- ═══ TOAST ═══ -->
<div id="toast"></div>

<!-- ═══ FOOTER ═══ -->
<footer id="site-footer">
  <div class="footer-inner">
    <div class="footer-org">
      <strong>청년노동자인권센터</strong>
      <span>서울시 종로구 성균관로12 5층</span>
      <a href="mailto:admin@younglabor.kr">admin@younglabor.kr</a>
    </div>
    <div class="footer-links">
      <a href="#">개인정보처리방침</a>
      <span style="color:rgba(255,255,255,0.2)">|</span>
      <a href="#">이용약관</a>
    </div>
  </div>
</footer>

<script>
var API_BASE = location.hostname.includes('github.io')
  ? 'https://laborconsult.vercel.app'
  : '';

// ── State ──
var boardState = { page: 1, q: '', category: '' };
var answerCache = {};
var searchTimer = null;

// ── Helpers ──
function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function getTimeAgo(isoStr) {
  if (!isoStr) return '';
  var diff = Date.now() - new Date(isoStr).getTime();
  var mins = Math.floor(diff / 60000);
  if (mins < 1) return '방금 전';
  if (mins < 60) return mins + '분 전';
  var hours = Math.floor(mins / 60);
  if (hours < 24) return hours + '시간 전';
  var days = Math.floor(hours / 24);
  if (days < 30) return days + '일 전';
  return new Date(isoStr).toLocaleDateString('ko-KR');
}

// ── URL Params ──
function parseUrlParams() {
  var params = new URLSearchParams(window.location.search);
  boardState.page = parseInt(params.get('page')) || 1;
  boardState.q = params.get('q') || '';
  boardState.category = params.get('category') || '';
}

function updateUrl() {
  var params = new URLSearchParams();
  if (boardState.q) params.set('q', boardState.q);
  if (boardState.category) params.set('category', boardState.category);
  if (boardState.page > 1) params.set('page', boardState.page);
  var qs = params.toString();
  history.replaceState(null, '', qs ? '?' + qs : location.pathname);
}

// ── Category ──
function selectCategory(btn, cat) {
  document.querySelectorAll('.cat-chip').forEach(function(c) { c.classList.remove('active'); });
  btn.classList.add('active');
  boardState.category = cat;
  boardState.page = 1;
  loadBoard();
  updateUrl();
}

async function loadCategories() {
  try {
    var resp = await fetch(API_BASE + '/api/board/categories');
    if (!resp.ok) return;
    var data = await resp.json();

    var container = document.getElementById('category-chips');
    data.categories.forEach(function(cat) {
      var btn = document.createElement('button');
      btn.className = 'cat-chip';
      if (boardState.category === cat.name) btn.classList.add('active');
      btn.dataset.cat = cat.name;
      btn.textContent = cat.name;
      btn.onclick = function() { selectCategory(btn, cat.name); };
      container.appendChild(btn);
    });

    // "전체" 버튼 active 상태 동기화
    if (boardState.category) {
      container.querySelector('[data-cat=""]').classList.remove('active');
    }

    document.getElementById('total-count').textContent = data.total.toLocaleString();
  } catch (e) {
    console.error('Categories load error:', e);
  }
}

// ── Board List ──
async function loadBoard() {
  var list = document.getElementById('board-list');
  list.innerHTML = '<div class="loading-skeleton">' +
    '<div class="skeleton-item"></div>'.repeat(5) + '</div>';

  var url = API_BASE + '/api/board/search?page=' + boardState.page + '&per_page=15';
  if (boardState.q) url += '&q=' + encodeURIComponent(boardState.q);
  if (boardState.category) url += '&category=' + encodeURIComponent(boardState.category);

  try {
    var resp = await fetch(url);
    if (!resp.ok) throw new Error('API error ' + resp.status);
    var data = await resp.json();

    list.innerHTML = '';

    if (data.items.length === 0) {
      list.innerHTML =
        '<div class="empty-state">' +
        '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>' +
        '<p>검색 결과가 없습니다</p>' +
        '<p class="empty-sub">다른 키워드로 검색해보세요</p>' +
        '</div>';
      document.getElementById('result-info').textContent = '';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    // Result info + 글쓰기 버튼
    var info = document.getElementById('result-info');
    var catLabel = boardState.category ? ' (' + escHtml(boardState.category) + ')' : '';
    info.innerHTML = '<span>총 ' + data.total.toLocaleString() + '건' + catLabel + '</span>' +
      '<button class="write-btn" onclick="openWriteModal()">&#9998; 질문하기</button>';

    // Render items
    data.items.forEach(function(item) {
      var div = document.createElement('div');
      div.className = 'board-item';
      div.dataset.id = item.id;
      div.dataset.source = item.source || 'ai';

      var timeAgo = getTimeAgo(item.created_at);
      var sourceBadge = item.source === 'user'
        ? '<span class="board-source user">질문</span>'
        : '';
      div.innerHTML =
        '<div class="board-q" onclick="toggleItem(this.parentElement)">' +
          '<span class="board-cat">' + escHtml(item.category || '일반') + '</span>' +
          sourceBadge +
          '<span class="board-text">' + escHtml(item.question) + '</span>' +
          '<span class="board-time">' + timeAgo + '</span>' +
          '<span class="board-chevron">\u25BC</span>' +
        '</div>' +
        '<div class="board-a">' +
          '<div class="board-a-loading">답변을 불러오는 중...</div>' +
        '</div>';
      list.appendChild(div);
    });

    renderPagination(data.page, data.total_pages);
  } catch (e) {
    console.error('Board load error:', e);
    list.innerHTML =
      '<div class="empty-state">' +
      '<p>질문을 불러올 수 없습니다</p>' +
      '<p class="empty-sub">잠시 후 다시 시도해주세요</p>' +
      '</div>';
  }
}

// ── Item Toggle + Detail Fetch ──
async function toggleItem(el) {
  var wasOpen = el.classList.contains('open');
  el.classList.toggle('open');

  if (wasOpen) return;

  var id = el.dataset.id;
  var answerDiv = el.querySelector('.board-a');

  if (answerCache[id]) {
    answerDiv.innerHTML = answerCache[id];
    return;
  }

  try {
    var resp = await fetch(API_BASE + '/api/board/' + id);
    if (!resp.ok) throw new Error('Detail fetch failed');
    var data = await resp.json();

    var askUrl = '/?q=' + encodeURIComponent(data.question.substring(0, 80));
    var html = '';

    if (data.source === 'user') {
      // 사용자 질문 — 답변 없음, 삭제 버튼 표시
      html =
        '<div class="md-content" style="padding-top:14px">' +
          '<p style="color:var(--text-muted)">아직 답변이 없습니다. AI 상담에서 비슷한 질문을 해보세요.</p>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap">' +
          '<a href="' + escHtml(askUrl) + '" class="board-ask-btn">' +
            '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
            'AI에게 물어보기' +
          '</a>' +
          '<button class="board-delete-btn" onclick="showDeletePrompt(\'' + id + '\',this)">&#128465; 삭제</button>' +
        '</div>';
    } else {
      // AI 답변 — 기존 로직
      var rendered = DOMPurify.sanitize(marked.parse(data.answer || ''));
      html =
        '<div class="md-content">' + rendered + '</div>' +
        '<a href="' + escHtml(askUrl) + '" class="board-ask-btn">' +
          '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>' +
          '비슷한 질문하기' +
        '</a>';
    }

    answerDiv.innerHTML = html;
    answerCache[id] = html;
  } catch (e) {
    answerDiv.innerHTML = '<div class="board-a-loading" style="color:var(--copper)">답변을 불러올 수 없습니다</div>';
  }
}

// ── Pagination ──
function renderPagination(page, totalPages) {
  var nav = document.getElementById('pagination');
  nav.innerHTML = '';
  if (totalPages <= 1) return;

  function addBtn(text, targetPage, disabled) {
    var btn = document.createElement('button');
    btn.className = 'page-btn';
    btn.textContent = text;
    btn.disabled = disabled;
    if (targetPage === page) btn.classList.add('active');
    if (!disabled) {
      btn.onclick = function() {
        boardState.page = targetPage;
        loadBoard();
        updateUrl();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };
    }
    nav.appendChild(btn);
  }

  addBtn('\u25C0', page - 1, page <= 1);

  var start = Math.max(1, page - 3);
  var end = Math.min(totalPages, start + 6);
  start = Math.max(1, end - 6);

  for (var i = start; i <= end; i++) {
    addBtn(i, i, false);
  }

  addBtn('\u25B6', page + 1, page >= totalPages);
}

// ── Search Debounce ──
document.getElementById('search-input').addEventListener('input', function(e) {
  clearTimeout(searchTimer);
  var val = e.target.value;
  searchTimer = setTimeout(function() {
    boardState.q = val.trim();
    boardState.page = 1;
    loadBoard();
    updateUrl();
  }, 300);
});

// ── Write Modal ──
var captchaToken = '';

function openWriteModal() {
  document.getElementById('write-modal').classList.add('active');
  document.getElementById('w-error').style.display = 'none';
  document.getElementById('write-form').reset();
  document.getElementById('w-charcount').textContent = '0/2000';
  loadCaptcha();
}

function closeWriteModal() {
  document.getElementById('write-modal').classList.remove('active');
}

function updateCharCount() {
  var len = document.getElementById('w-question').value.length;
  document.getElementById('w-charcount').textContent = len + '/2000';
}

async function loadCaptcha() {
  var qEl = document.getElementById('captcha-q');
  qEl.textContent = '로딩 중...';
  try {
    var resp = await fetch(API_BASE + '/api/captcha');
    var data = await resp.json();
    qEl.textContent = data.question;
    captchaToken = data.token;
    document.getElementById('w-captcha').value = '';
  } catch (e) {
    qEl.textContent = '오류 — 새로고침';
  }
}

async function submitPost(e) {
  e.preventDefault();
  var errEl = document.getElementById('w-error');
  var submitBtn = document.getElementById('w-submit');
  errEl.style.display = 'none';
  submitBtn.disabled = true;
  submitBtn.textContent = '등록 중...';

  var body = {
    nickname: document.getElementById('w-nickname').value.trim(),
    password: document.getElementById('w-password').value,
    category: document.getElementById('w-category').value,
    question: document.getElementById('w-question').value.trim(),
    captcha_token: captchaToken,
    captcha_answer: parseInt(document.getElementById('w-captcha').value, 10) || 0
  };

  try {
    var resp = await fetch(API_BASE + '/api/board/write', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    var data = await resp.json();

    if (!resp.ok) {
      errEl.textContent = data.error || '오류가 발생했습니다';
      errEl.style.display = 'block';
      if (resp.status === 403) loadCaptcha();
      if (resp.status === 429) {
        submitBtn.disabled = true;
        setTimeout(function() { submitBtn.disabled = false; }, 30000);
      }
      return;
    }

    closeWriteModal();
    showToast('질문이 등록되었습니다');
    answerCache = {};
    boardState.page = 1;
    loadBoard();
  } catch (e) {
    errEl.textContent = '네트워크 오류가 발생했습니다';
    errEl.style.display = 'block';
  } finally {
    submitBtn.disabled = false;
    submitBtn.textContent = '질문 등록하기';
  }
  return false;
}

// ── Delete ──
function showDeletePrompt(postId, btnEl) {
  var parent = btnEl.closest('.board-a');
  var existing = parent.querySelector('.delete-prompt');
  if (existing) { existing.remove(); return; }

  var div = document.createElement('div');
  div.className = 'delete-prompt';
  div.innerHTML =
    '<input type="password" placeholder="비밀번호 입력" id="del-pw-' + postId + '">' +
    '<button class="delete-confirm" onclick="confirmDelete(\'' + postId + '\')">삭제</button>' +
    '<button class="delete-cancel" onclick="this.closest(\'.delete-prompt\').remove()">취소</button>';
  parent.appendChild(div);
  div.querySelector('input').focus();
}

async function confirmDelete(postId) {
  var pwInput = document.getElementById('del-pw-' + postId);
  if (!pwInput || !pwInput.value) return;

  try {
    var resp = await fetch(API_BASE + '/api/board/' + postId + '/delete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwInput.value })
    });
    var data = await resp.json();

    if (!resp.ok) {
      showToast(data.error || '삭제 실패');
      return;
    }

    showToast('삭제되었습니다');
    delete answerCache[postId];
    loadBoard();
  } catch (e) {
    showToast('네트워크 오류');
  }
}

// ── Toast ──
var toastTimer = null;
function showToast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 3000);
}

// ── Keyboard ──
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeWriteModal();
});

// ── Init ──
parseUrlParams();
document.getElementById('search-input').value = boardState.q;
loadCategories();
loadBoard();
</script>
</body>
